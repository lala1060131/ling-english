<script>
const ARTICLES=[
  {id:'r001',level:1,topic:'Health',title:'Healthy Breakfast',
   article:`Starting your day with a healthy breakfast is one of the best habits you can build. Many students skip breakfast because they feel too busy or tired in the morning. However, research shows that eating breakfast helps improve concentration, memory, and academic performance.\n\nA good breakfast should include protein, carbohydrates, and healthy fats. Eggs, whole grain bread, fruit, and dairy products are all excellent choices. Avoid sugary cereals and processed foods that cause blood sugar to spike and crash.\n\nStudies from Taiwan and other Asian countries show that students who eat breakfast regularly score higher on tests and feel more energetic throughout the day. Making breakfast a priority, even a simple one, can make a significant difference in your learning ability.`,
   vocab:[{word:'concentration',zh:'專注力'},{word:'academic',zh:'學術的'},{word:'protein',zh:'蛋白質'},{word:'carbohydrates',zh:'碳水化合物'},{word:'processed',zh:'加工的'}],
   mainIdea:'Eating breakfast regularly improves students\' academic performance and overall energy levels.',
   structure:['問題 — 許多學生不吃早餐','影響 — 對學習和體力的危害','解決方案 — 均衡早餐的選擇'],
   questions:[
     {q:'What is the main idea of this article?',opts:['Breakfast is the only important meal','Eating breakfast helps students learn better','All cereals are unhealthy','Students should wake up earlier'],ans:1},
     {q:'According to the article, what should a good breakfast include?',opts:['Only fruit and water','Sugary cereals and juice','Protein, carbohydrates, and healthy fats','Processed foods and snacks'],ans:2},
     {q:'What can we infer about students who skip breakfast?',opts:['They are healthier','They may perform worse academically','They save time for studying','They prefer lunch'],ans:1}
   ]},
  {id:'r002',level:1,topic:'Technology',title:'The Rise of Smartphones',
   article:`Over the past two decades, smartphones have completely transformed the way people communicate, work, and entertain themselves. What started as a simple device for making calls has evolved into a powerful computer that fits in your pocket.\n\nToday, smartphones allow users to browse the internet, take high-quality photos, navigate using GPS, and access thousands of applications. Social media platforms, messaging apps, and video streaming services have made it possible to stay connected with people around the world at any time.\n\nHowever, smartphones also come with challenges. Excessive screen time has been linked to sleep problems, reduced attention spans, and social anxiety among young people. Finding a healthy balance between digital and real-world interactions is an important skill for the modern generation.`,
   vocab:[{word:'transformed',zh:'改變了'},{word:'evolved',zh:'演化'},{word:'navigate',zh:'導航'},{word:'excessive',zh:'過度的'},{word:'generation',zh:'世代'}],
   mainIdea:'Smartphones have revolutionized modern life but also created new challenges for users.',
   structure:['現象 — 智慧型手機的崛起','功能 — 帶來的便利性','問題 — 過度使用的負面影響'],
   questions:[
     {q:'How have smartphones changed over time?',opts:['They became smaller only','They evolved from simple phones to powerful computers','They replaced all other technology','They became more expensive'],ans:1},
     {q:'Which problem is mentioned regarding smartphone use?',opts:['Poor camera quality','High cost','Sleep problems and reduced attention spans','Slow internet speed'],ans:2},
     {q:'What skill does the article suggest is important?',opts:['Learning to code apps','Balancing digital and real-world interactions','Using more social media','Buying better smartphones'],ans:1}
   ]},
  {id:'r003',level:2,topic:'Environment',title:'Plastic Pollution in the Ocean',
   article:`Every year, millions of tons of plastic waste end up in the world's oceans. This plastic does not break down easily and can remain in the water for hundreds of years. Marine animals such as turtles, fish, and seabirds often mistake plastic for food, which can cause serious harm or even death.\n\nOne of the biggest problems is microplastics, tiny pieces of plastic smaller than five millimeters. These particles have been found in seafood, drinking water, and even the air we breathe. Scientists are still studying the long-term effects of microplastics on human health.\n\nTo solve this crisis, many countries have started banning single-use plastics such as straws and shopping bags. Individuals can also help by recycling properly, using reusable containers, and reducing their overall plastic consumption. Protecting the ocean requires effort from both governments and ordinary people.`,
   vocab:[{word:'pollution',zh:'污染'},{word:'marine',zh:'海洋的'},{word:'microplastics',zh:'微塑膠'},{word:'particles',zh:'微粒'},{word:'consumption',zh:'消耗'}],
   mainIdea:'Plastic pollution threatens ocean life and human health, requiring action from both governments and individuals.',
   structure:['問題 — 海洋塑膠污染的規模','深入 — 微塑膠的危害','解決方案 — 政府與個人的行動'],
   questions:[
     {q:'Why is plastic pollution a serious problem for the ocean?',opts:['It makes water dirty for a few days','It does not break down and harms marine animals','It is too expensive to remove','It only affects turtles'],ans:1},
     {q:'What are microplastics?',opts:['Large plastic bottles','Tiny plastic pieces smaller than five millimeters','A type of fish food','Recycled plastic products'],ans:1},
     {q:'According to the article, how can individuals help?',opts:['By eating more seafood','By using more straws','By recycling and reducing plastic use','By ignoring the problem'],ans:2}
   ]},
  {id:'r004',level:2,topic:'Culture',title:'The Tradition of Lunar New Year',
   article:`Lunar New Year is one of the most important festivals celebrated across many Asian countries, including Taiwan, China, Korea, and Vietnam. Unlike the Western calendar, the date of this festival changes each year because it follows the cycles of the moon.\n\nFamilies gather together to enjoy reunion dinners, which often feature symbolic foods. For example, fish represents abundance, while dumplings symbolize wealth. Children receive red envelopes filled with money, believed to bring good luck and drive away evil spirits.\n\nIn recent years, some traditions have changed as younger generations move to cities for work. Video calls now allow distant family members to celebrate together, and digital red envelopes have become popular. Despite these changes, the core values of family, gratitude, and hope for the future remain strong.`,
   vocab:[{word:'festival',zh:'節慶'},{word:'symbolic',zh:'象徵性的'},{word:'abundance',zh:'豐盛'},{word:'gratitude',zh:'感恩'},{word:'generations',zh:'世代'}],
   mainIdea:'Lunar New Year celebrates family and tradition, adapting to modern life while keeping its core values.',
   structure:['介紹 — 農曆新年的重要性','習俗 — 象徵食物與紅包','變化 — 現代化的調整與不變的核心'],
   questions:[
     {q:'Why does the date of Lunar New Year change each year?',opts:['It follows the Western calendar','It follows the cycles of the moon','People vote on the date','It depends on the weather'],ans:1},
     {q:'What does fish symbolize during the reunion dinner?',opts:['Health','Wisdom','Abundance','Peace'],ans:2},
     {q:'How have younger generations changed the tradition?',opts:['They stopped celebrating','They use video calls and digital red envelopes','They moved to Western countries','They removed all symbolic foods'],ans:1}
   ]},
  {id:'r005',level:3,topic:'Science',title:'How Vaccines Protect Us',
   article:`Vaccines are one of the greatest achievements in the history of medicine. They have saved millions of lives by preventing dangerous diseases such as polio, measles, and smallpox. But how exactly do vaccines work?\n\nWhen a vaccine is injected into the body, it contains a weakened or inactive part of a germ. This triggers the immune system to produce antibodies, which are special proteins that fight infection. The body then remembers how to defeat that particular germ in the future.\n\nThis process is called immunity. If a vaccinated person is later exposed to the real disease, their immune system can respond quickly and effectively. When a large percentage of a population is vaccinated, it creates herd immunity, protecting even those who cannot receive vaccines, such as newborn babies or people with certain illnesses.`,
   vocab:[{word:'vaccine',zh:'疫苗'},{word:'immune system',zh:'免疫系統'},{word:'antibodies',zh:'抗體'},{word:'immunity',zh:'免疫力'},{word:'exposed',zh:'暴露於'}],
   mainIdea:'Vaccines train the immune system to fight diseases and protect both individuals and communities.',
   structure:['背景 — 疫苗的重要成就','原理 — 免疫系統如何運作','延伸 — 群體免疫的概念'],
   questions:[
     {q:'What does a vaccine contain?',opts:['A strong live germ','A weakened or inactive part of a germ','Only water and sugar','Antibiotics'],ans:1},
     {q:'What are antibodies?',opts:['Types of germs','Special proteins that fight infection','A kind of vaccine','White blood cells only'],ans:1},
     {q:'What is herd immunity?',opts:['Immunity for animals only','Protection created when many people are vaccinated','A disease that spreads quickly','A new type of vaccine'],ans:1}
   ]},
  {id:'r006',level:3,topic:'Society',title:'The Importance of Sleep for Teenagers',
   article:`Many teenagers struggle to get enough sleep, and this has become a growing concern for parents, teachers, and doctors. Research suggests that teenagers need about eight to ten hours of sleep each night, yet most get far less due to homework, social media, and early school start times.\n\nDuring sleep, the brain processes information learned during the day and stores it in long-term memory. Lack of sleep can lead to poor concentration, lower grades, mood swings, and even weakened immunity. Some studies have also linked sleep deprivation to a higher risk of accidents and depression.\n\nExperts recommend several strategies to improve sleep quality. These include keeping a regular sleep schedule, avoiding screens before bedtime, and creating a quiet, dark environment. Some schools have even experimented with later start times, and the results show improvements in both attendance and academic performance.`,
   vocab:[{word:'concern',zh:'憂慮'},{word:'process',zh:'處理'},{word:'deprivation',zh:'剝奪'},{word:'depression',zh:'憂鬱症'},{word:'strategies',zh:'策略'}],
   mainIdea:'Teenagers need adequate sleep for health and learning, and several strategies can improve sleep quality.',
   structure:['問題 — 青少年睡眠不足','影響 — 對學習與健康的危害','解決方案 — 改善睡眠的方法'],
   questions:[
     {q:'How many hours of sleep do teenagers need each night?',opts:['Four to five hours','Six to seven hours','Eight to ten hours','Twelve hours'],ans:2},
     {q:'What happens in the brain during sleep?',opts:['It stops working completely','It processes and stores information','It grows larger','It produces food'],ans:1},
     {q:'What is one recommended strategy to improve sleep?',opts:['Using screens before bed','Drinking coffee at night','Keeping a regular sleep schedule','Studying all night'],ans:2}
   ]},
  {id:'r007',level:3,topic:'Technology',title:'Artificial Intelligence in Daily Life',
   article:`Artificial intelligence, often called AI, is no longer something found only in science fiction movies. Today, it is part of our everyday lives in ways many people do not even notice. From voice assistants on our phones to recommendation systems on streaming platforms, AI quietly shapes how we live and make decisions.\n\nAI works by analyzing large amounts of data to find patterns and make predictions. For example, when an online store suggests products you might like, it is using AI to study your past behavior. Self-driving cars, medical diagnosis tools, and language translation apps all rely on this powerful technology.\n\nHowever, the rise of AI also raises important questions. Some people worry about job losses, privacy, and the possibility of machines making unfair decisions. As AI continues to develop, society must find ways to use it responsibly while protecting human values and rights.`,
   vocab:[{word:'artificial',zh:'人工的'},{word:'analyzing',zh:'分析'},{word:'patterns',zh:'模式'},{word:'predictions',zh:'預測'},{word:'responsibly',zh:'負責任地'}],
   mainIdea:'AI is widely used in daily life and offers great benefits, but it also raises concerns that society must address.',
   structure:['現象 — AI 融入日常生活','原理 — 分析數據找出模式','省思 — AI 帶來的疑慮與責任'],
   questions:[
     {q:'How is AI part of everyday life according to the article?',opts:['Only in movies','In voice assistants and recommendation systems','Only in laboratories','Only in cars'],ans:1},
     {q:'How does AI make predictions?',opts:['By guessing randomly','By analyzing large amounts of data','By asking humans','By copying other machines'],ans:1},
     {q:'What concern about AI is mentioned?',opts:['It is too slow','It uses too much electricity','Job losses and privacy issues','It cannot translate languages'],ans:2}
   ]},
  {id:'r008',level:4,topic:'Environment',title:'Climate Change and Its Effects',
   article:`Climate change is one of the most serious challenges facing our planet today. It refers to long-term shifts in temperature and weather patterns, mainly caused by human activities such as burning fossil fuels and cutting down forests.\n\nThe effects of climate change are already visible around the world. Rising global temperatures have led to melting glaciers, higher sea levels, and more extreme weather events such as floods, droughts, and powerful storms. These changes threaten not only the natural environment but also human communities, agriculture, and economies.\n\nScientists agree that urgent action is needed to slow down climate change. Solutions include switching to renewable energy sources like solar and wind power, planting more trees, and reducing waste. International cooperation is essential, as climate change is a global problem that no single country can solve alone.`,
   vocab:[{word:'fossil fuels',zh:'化石燃料'},{word:'glaciers',zh:'冰川'},{word:'extreme',zh:'極端的'},{word:'renewable',zh:'可再生的'},{word:'cooperation',zh:'合作'}],
   mainIdea:'Climate change, caused by human activity, has serious global effects and requires urgent international action.',
   structure:['定義 — 氣候變遷的成因','影響 — 全球可見的後果','解決方案 — 再生能源與國際合作'],
   questions:[
     {q:'What mainly causes climate change?',opts:['Natural cycles only','Human activities like burning fossil fuels','Too much rain','Animal migration'],ans:1},
     {q:'Which is an effect of climate change mentioned in the article?',opts:['Lower sea levels','Melting glaciers and extreme weather','Colder summers everywhere','Fewer storms'],ans:1},
     {q:'Why is international cooperation important?',opts:['Because one country cannot solve it alone','Because it is cheaper','Because only rich countries are affected','Because it is required by law'],ans:0}
   ]},
  {id:'r009',level:4,topic:'Health',title:'The Truth About Fast Food',
   article:`Fast food has become a popular choice for busy people around the world. It is cheap, convenient, and tastes good to many people. However, eating too much fast food can have serious effects on our health.\n\nMost fast food is high in calories, salt, sugar, and unhealthy fats, but low in important nutrients such as vitamins and fiber. Regularly consuming these foods has been linked to obesity, heart disease, type 2 diabetes, and high blood pressure. The large portion sizes common in many restaurants also encourage people to eat more than they need.\n\nThis does not mean people must avoid fast food completely. The key is moderation and balance. Choosing healthier options, such as grilled instead of fried items, drinking water instead of soda, and eating fast food only occasionally, can help people enjoy these meals without damaging their health.`,
   vocab:[{word:'convenient',zh:'方便的'},{word:'nutrients',zh:'營養素'},{word:'obesity',zh:'肥胖'},{word:'portion',zh:'份量'},{word:'moderation',zh:'適度'}],
   mainIdea:'Fast food is convenient but unhealthy in excess; moderation and smarter choices are the key.',
   structure:['現象 — 速食的普及','問題 — 對健康的危害','建議 — 適度與聰明的選擇'],
   questions:[
     {q:'Why do many people choose fast food?',opts:['It is very healthy','It is cheap, convenient, and tasty','It has many vitamins','It is hard to find'],ans:1},
     {q:'What health problem is linked to eating too much fast food?',opts:['Better eyesight','Obesity and heart disease','Stronger bones','Improved memory'],ans:1},
     {q:'What does the article suggest about eating fast food?',opts:['Avoid it completely forever','Eat it for every meal','Practice moderation and make healthier choices','Only eat fried items'],ans:2}
   ]},
  {id:'r010',level:4,topic:'Education',title:'The Benefits of Learning a Second Language',
   article:`Learning a second language offers far more benefits than simply being able to communicate with more people. In our increasingly connected world, bilingual abilities have become a valuable skill in both education and the workplace.\n\nStudies have shown that learning another language can improve brain function. Bilingual people often have better memory, stronger problem-solving skills, and greater creativity. Some research even suggests that speaking two languages may delay the onset of certain age-related brain diseases.\n\nBeyond the mental benefits, knowing a second language opens doors to new cultures and opportunities. Travelers can connect more deeply with local people, and job seekers gain a competitive advantage. While learning a language takes time and effort, the rewards last a lifetime and enrich a person in countless ways.`,

  {id:'r012',level:5,topic:'Science',title:'The Mystery of Black Holes',
   article:`Black holes are among the most fascinating and mysterious objects in the universe. A black hole is a region in space where gravity is so strong that nothing, not even light, can escape from it. Because no light can come out, black holes are invisible and can only be detected by their effects on nearby objects.\n\nBlack holes form when massive stars run out of fuel and collapse under their own gravity. The center of a black hole, called the singularity, is a point of infinite density. Surrounding it is the event horizon, a boundary beyond which escape becomes impossible.\n\nIn 2019, scientists captured the first ever image of a black hole, located in a distant galaxy. This achievement confirmed predictions made by Albert Einstein over a century ago. Studying black holes helps scientists understand gravity, space, and time, and continues to push the limits of human knowledge.`,

  {id:'r013',level:5,topic:'Culture',title:'Street Art: Vandalism or Expression?',
   article:`Street art has long been a topic of heated debate. To some, it is a beautiful form of self-expression that brings color and meaning to dull city walls. To others, it is nothing more than vandalism that damages public and private property.\n\nModern street art ranges from simple graffiti tags to large, detailed murals that tell powerful stories. Artists like Banksy have gained worldwide fame, and their works now sell for millions of dollars. Some cities have even created legal walls and festivals to celebrate this art form, recognizing its cultural and economic value.\n\nHowever, the line between art and crime remains unclear. Creating art on someone's property without permission is illegal in most places. The challenge for cities is to find a balance, allowing creative expression while respecting the rights of property owners and maintaining public order.`,

  {id:'r014',level:6,topic:'Technology',title:'The Future of Electric Vehicles',
   article:`Electric vehicles, or EVs, are rapidly changing the way the world thinks about transportation. Unlike traditional cars that run on gasoline, EVs are powered by electricity stored in large batteries. As concerns about pollution and climate change grow, more drivers are making the switch.\n\nThe advantages of electric vehicles are significant. They produce no exhaust emissions, which helps reduce air pollution in cities. They are also cheaper to operate, since electricity costs less than gasoline and EVs require less maintenance. Many governments now offer financial incentives to encourage people to buy them.\n\nHowever, challenges remain. The driving range of some EVs is still limited, and charging stations are not yet available everywhere. Producing batteries also requires rare materials that can be difficult to obtain. Despite these obstacles, experts predict that electric vehicles will dominate the roads within the next few decades.`,

  {id:'r015',level:6,topic:'Society',title:'Social Media and Mental Health',
   article:`Social media has transformed how people connect, share, and access information. Platforms like Instagram, TikTok, and Facebook allow billions of users to stay in touch with friends and discover new ideas. Yet growing evidence suggests that heavy social media use may negatively affect mental health, especially among young people.\n\nOne major concern is the pressure to present a perfect life online. Constantly comparing oneself to carefully edited images can lead to feelings of inadequacy, anxiety, and low self-esteem. The fear of missing out, often called FOMO, can also make users feel anxious and dissatisfied with their own lives.\n\nExperts do not suggest abandoning social media entirely, but rather using it more mindfully. Setting time limits, following positive accounts, and taking regular breaks can help. Most importantly, remembering that online content rarely reflects real life can protect users from unnecessary stress and comparison.`,

  {id:'r016',level:6,topic:'Environment',title:'The Importance of Bees',
   article:`Bees may be small, but they play a giant role in keeping our planet healthy. As they fly from flower to flower collecting nectar, bees transfer pollen, a process called pollination. This allows plants to produce fruits, vegetables, and seeds. In fact, about one third of the food we eat depends on pollination by bees and other insects.\n\nUnfortunately, bee populations around the world have been declining at an alarming rate. Scientists believe several factors are to blame, including the use of harmful pesticides, loss of natural habitats, climate change, and disease. The disappearance of bees could threaten global food supplies and entire ecosystems.\n\nProtecting bees is therefore essential for both nature and humanity. People can help by planting bee-friendly flowers, avoiding chemical pesticides, and supporting local beekeepers. Even small actions, when taken by many people, can make a real difference in saving these vital insects.`,

  {id:'r017',level:7,topic:'Education',title:'Online Learning: Opportunities and Challenges',
   article:`Online learning has grown dramatically in recent years, especially after the global pandemic forced schools to close. Through computers and the internet, students can now attend classes, submit assignments, and interact with teachers from anywhere in the world. This shift has opened up exciting new opportunities for education.\n\nOne of the biggest advantages is flexibility. Students can learn at their own pace and review lessons whenever they need. Online learning also makes education more accessible to people in remote areas or those who cannot attend traditional schools. A wide variety of courses, from coding to cooking, is now available to anyone with an internet connection.\n\nHowever, online learning is not without its problems. Some students struggle with a lack of face-to-face interaction and find it hard to stay motivated. Technical issues and unequal access to devices and reliable internet can also create barriers. To be successful, online learning requires strong self-discipline and proper support from both teachers and families.`,

  {id:'r019',level:7,topic:'Science',title:'Renewable Energy for a Sustainable Future',

  {id:'r020',level:8,topic:'Society',title:'The Value of Failure',
   article:`In a world that often celebrates success, we tend to forget that failure is a natural and necessary part of life. Many of history's greatest achievements were built on a foundation of repeated failures. Understanding how to deal with failure may be one of the most important skills a person can develop.\n\nFamous inventors, scientists, and entrepreneurs frequently faced rejection and setbacks before reaching success. Thomas Edison reportedly failed thousands of times before inventing a working light bulb. Rather than giving up, he viewed each failure as a lesson that brought him closer to his goal. This mindset, often called resilience, allows people to recover from disappointment and keep moving forward.\n\nLearning to embrace failure does not mean enjoying it, but rather seeing it as an opportunity to grow. When we analyze our mistakes, we discover what does not work and gain valuable knowledge. Parents and teachers can help young people by encouraging them to take risks, make mistakes, and understand that failure is not the opposite of success, but a part of it.`,

let currentArticle=0;
let quizAnswers={};
let quizSubmitted=false;

document.addEventListener('DOMContentLoaded',()=>{App.init();renderArticleList();renderArticle(0);});

function toggleSidebar2(){
  const sb=document.getElementById('sidebar2');
  const main=document.querySelector('.reading-main');
  const openBtn=document.getElementById('sidebar2-open');
  const collapsed=sb.classList.toggle('collapsed');
  main.classList.toggle('expanded', collapsed);
  if(collapsed){
    openBtn.style.display='flex';
    // 收合後 open btn 緊貼 sidebar1 右邊
    openBtn.style.left='calc(var(--sidebar-w))';
  } else {
    openBtn.style.display='none';
  }
}

function renderArticleList(){
  const rp=Storage.load('ling_reading_progress')||{};
  const list=document.getElementById('article-list');
  list.innerHTML=ARTICLES.map((a,i)=>`
    <div class="art-item ${i===currentArticle?'active':''} ${rp[a.id]?.done?'done':''}" onclick="loadArticle(${i})">
      <div class="art-title">${a.title}${rp[a.id]?.done?' ✓':''}</div>
      <div class="art-meta">
        <span class="art-level">Level ${a.level}</span>
        <span class="art-topic">${a.topic}</span>
      </div>
    </div>`).join('');
  for(let i=ARTICLES.length+1;i<=20;i++){
    list.innerHTML+=`<div class="art-item locked" style="opacity:.3">
      <div class="art-title">Article ${i} 🔒</div>
      <div class="art-meta"><span class="art-level">Level ${Math.ceil(i/2)}</span></div>
    </div>`;
  }
}

function loadArticle(i){currentArticle=i;quizAnswers={};quizSubmitted=false;renderArticleList();renderArticle(i);}

function renderArticle(i){
  const a=ARTICLES[i];
  const area=document.getElementById('reading-area');
  area.innerHTML=`
    <div class="article-card">
      <div class="article-meta">
        <span class="level-badge">Level ${a.level}</span>
        <span class="topic-badge">${a.topic}</span>
      </div>
      <div class="article-title">${a.title}</div>
      <div class="article-body">${a.article.replace(/\n\n/g,'</p><p style="margin-top:16px">').replace(/^/,'<p>').replace(/$/,'</p>')}</div>
      <div class="vocab-hints">
        <h4>📖 字彙提示</h4>
        <div class="vocab-hint-row">${a.vocab.map(v=>`<span class="vh-item"><strong>${v.word}</strong> = ${v.zh}</span>`).join('<span style="color:var(--border)">｜</span>')}</div>
      </div>
    </div>

    <div class="analysis-card">
      <div class="analysis-section">
        <h4>🧱 文章結構分析</h4>
        <div class="struct-flow">${a.structure.map((s,si)=>`
          <div class="struct-item"><div class="struct-dot"></div><span style="font-size:13px;color:var(--text-sec)">${s}</span></div>
          ${si<a.structure.length-1?'<div class="struct-line" style="margin-left:3px"></div>':''}`).join('')}
        </div>
      </div>
      <div class="analysis-section">
        <h4>💡 主旨大意</h4>
        <div class="main-idea-box">${a.mainIdea}</div>
      </div>
    </div>

    <div class="reading-quiz">
      <h3>🎯 閱讀測驗（3題）</h3>
      ${a.questions.map((q,qi)=>`
        <div class="rq-item">
          <div class="rq-question">Q${qi+1}. ${q.q}</div>
          <div class="rq-options">
            ${q.opts.map((opt,oi)=>`<button class="rq-opt" id="q${qi}o${oi}" onclick="selectOpt(${qi},${oi},${q.ans})">${String.fromCharCode(65+oi)}. ${opt}</button>`).join('')}
          </div>
        </div>`).join('')}
      <button class="submit-reading" onclick="submitReading()">提交答案</button>
    </div>`;
}

function selectOpt(qi,oi,ans){
  if(quizSubmitted)return;
  quizAnswers[qi]=oi;
  const opts=document.querySelectorAll(`[id^="q${qi}o"]`);
  opts.forEach((o,i)=>o.style.borderColor=i===oi?'rgba(124,58,237,.5)':'');
}

function submitReading(){
  if(quizSubmitted)return;
  const a=ARTICLES[currentArticle];
  let correct=0;
  a.questions.forEach((q,qi)=>{
    const selected=quizAnswers[qi];
    if(selected===undefined)return;
    const opts=document.querySelectorAll(`[id^="q${qi}o"]`);
    opts.forEach((o,oi)=>{
      if(oi===q.ans)o.classList.add('correct');
      else if(oi===selected&&selected!==q.ans)o.classList.add('wrong');
      o.disabled=true;
    });
    if(selected===q.ans)correct++;
  });
  quizSubmitted=true;
  const pct=Math.round(correct/a.questions.length*100);
  const rp=Storage.load('ling_reading_progress')||{};
  rp[a.id]={done:true,accuracy:pct,date:new Date().toISOString().split('T')[0]};
  Storage.save('ling_reading_progress',rp);
  renderArticleList();
  alert(`📖 閱讀完成！正確率：${pct}%（${correct}/${a.questions.length} 題正確）`);
}
</script>

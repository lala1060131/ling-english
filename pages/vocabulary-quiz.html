<style>
.quiz-layout { display:flex; min-height:100vh; }
.quiz-main { margin-left:var(--sidebar-w); flex:1; padding:32px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; }
.quiz-container { width:100%; max-width:760px; }

.quiz-header { margin-bottom:24px; }
.quiz-header h2 { font-size:18px; font-weight:700; margin-bottom:4px; }
.quiz-header p { font-size:13px; color:var(--text-muted); }

.quiz-progress-bar { height:8px; background:rgba(255,255,255,0.08); border-radius:99px; margin-bottom:8px; overflow:hidden; }
.quiz-progress-fill { height:100%; background:linear-gradient(90deg,var(--purple),var(--gold)); border-radius:99px; transition:width 0.4s ease; }
.quiz-progress-label { display:flex; justify-content:space-between; font-size:12px; color:var(--text-muted); margin-bottom:24px; }

.question-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:36px; margin-bottom:20px; text-align:center; }
.question-word { font-size:52px; font-weight:900; background:linear-gradient(135deg,#fff 30%,var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
.question-phonetic { font-size:16px; color:var(--text-muted); margin-bottom:4px; display:flex; align-items:center; justify-content:center; gap:10px; }
.btn-audio-sm { background:rgba(124,58,237,0.2); border:1px solid rgba(124,58,237,0.3); color:#A78BFA; padding:3px 10px; border-radius:99px; font-size:12px; cursor:pointer; }
.question-hint { font-size:13px; color:var(--text-sec); margin-top:8px; }

.options-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.option-btn {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:16px 20px;
  font-size:15px; font-weight:500; color:var(--text);
  cursor:pointer; text-align:left; transition:all 0.2s ease;
  display:flex; align-items:center; gap:12px;
}
.option-btn:hover:not(:disabled) { background:rgba(124,58,237,0.15); border-color:rgba(124,58,237,0.4); }
.option-btn.correct { background:rgba(16,185,129,0.15); border-color:var(--success); color:var(--success); }
.option-btn.wrong { background:rgba(239,68,68,0.15); border-color:var(--danger); color:var(--danger); }
.option-btn:disabled { cursor:not-allowed; }
.option-label { width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
.option-btn.correct .option-label { background:var(--success); color:white; }
.option-btn.wrong .option-label { background:var(--danger); color:white; }

.quiz-actions { display:flex; justify-content:space-between; align-items:center; }
.uncertain-btn { background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--text-muted); padding:10px 18px; border-radius:var(--radius-xs); font-size:13px; cursor:pointer; transition:all var(--transition); }
.uncertain-btn:hover { color:var(--text); }
.next-btn { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; padding:10px 24px; border-radius:var(--radius-xs); font-size:14px; font-weight:700; border:none; cursor:pointer; transition:all var(--transition); }
.next-btn:hover { opacity:0.85; }
.next-btn:disabled { opacity:0.3; cursor:not-allowed; }

/* Result Modal */
.result-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:999; backdrop-filter:blur(8px); opacity:0; pointer-events:none; transition:opacity 0.3s; }
.result-overlay.show { opacity:1; pointer-events:all; }
.result-card { background:linear-gradient(135deg,#1a0d30,#0d0820); border:1px solid rgba(246,196,83,0.3); border-radius:var(--radius); padding:40px; max-width:420px; width:90%; text-align:center; animation:fadeIn 0.4s ease; }
.result-trophy { font-size:60px; margin-bottom:16px; }
.result-title { font-size:24px; font-weight:800; color:var(--gold); margin-bottom:8px; }
.result-score { font-size:64px; font-weight:900; background:linear-gradient(135deg,#fff,var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; }
.result-sub { font-size:14px; color:var(--text-muted); margin-bottom:24px; }
.result-stats { display:flex; justify-content:center; gap:32px; margin-bottom:24px; }
.result-stat .val { font-size:24px; font-weight:700; }
.result-stat .lbl { font-size:11px; color:var(--text-muted); }
.result-stat.good .val { color:var(--success); }
.result-stat.bad .val { color:var(--danger); }
.result-stat.time .val { color:var(--purple-light); }
.result-msg { font-size:14px; color:var(--text-sec); margin-bottom:20px; }
.unlock-announce { background:rgba(246,196,83,0.1); border:1px solid rgba(246,196,83,0.3); border-radius:var(--radius-xs); padding:12px; font-size:13px; color:var(--gold); margin-bottom:20px; }
.result-btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.result-btns button { padding:10px 20px; border-radius:var(--radius-xs); font-size:13px; font-weight:600; cursor:pointer; border:none; }
.btn-retry { background:var(--bg-card); border:1px solid var(--border)!important; border:none; color:var(--text); }
.btn-unlock { background:linear-gradient(135deg,var(--gold),var(--gold-dark)); color:#1a1a1a; }
.btn-next-level { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
</style>
</head>

    {id:"vocab_0124",level:10,word:"contradict",chinese:"v. 矛盾；反駁",phonetic:"/ˌkɒntrəˈdɪkt/"},

  for(let lv=1; lv<=10; lv++){
    VOCAB_DATA[lv] = ALL_WORDS.filter(w => w.level === lv);
  }
}

const params = new URLSearchParams(location.search);
const level = parseInt(params.get('level')) || 1;
loadVocabData();
let words = VOCAB_DATA[level] || VOCAB_DATA[1];
let questions = [];
let current = 0;
let correct = 0;
let wrong = 0;
let startTime = Date.now();
let answered = false;

document.getElementById('quiz-level-title').textContent = `Level ${level < 10 ? '0'+level : level} 基礎入門 (1-15)`;
document.getElementById('q-total').textContent = words.length;

function generateQuestions() {
  questions = words.map(w => {
    const distractors = words.filter(x => x.id !== w.id).sort(()=>Math.random()-0.5).slice(0,3);
    const opts = [...distractors.map(d=>d.chinese), w.chinese].sort(()=>Math.random()-0.5);
    return { word: w.word, phonetic: w.phonetic, answer: w.chinese, options: opts };
  });
  questions.sort(()=>Math.random()-0.5);
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('q-word').textContent = q.word;
  document.getElementById('q-phonetic').textContent = q.phonetic;
  document.getElementById('q-num').textContent = current + 1;
  const pct = Math.round((current / words.length) * 100);
  document.getElementById('quiz-bar').style.width = pct + '%';
  document.getElementById('q-pct').textContent = pct + '%';
  document.getElementById('next-btn').disabled = true;

  const labels = ['A','B','C','D'];
  const grid = document.getElementById('options-grid');
  grid.innerHTML = q.options.map((opt, i) => `
    <button class="option-btn" data-answer="${opt.replace(/"/g,'&quot;')}" onclick="selectOption(this)">
      <span class="option-label">${labels[i]}</span>${opt}
    </button>
  `).join('');
}

function selectOption(btn) {
  if (answered) return;
  answered = true;
  const selected = btn.getAttribute('data-answer');
  const q = questions[current];
  const isCorrect = selected === q.answer;
  if (isCorrect) correct++; else wrong++;

  document.querySelectorAll('.option-btn').forEach(b => {
    const ans = b.getAttribute('data-answer');
    if (ans === q.answer) b.classList.add('correct');
    else if (b === btn && !isCorrect) b.classList.add('wrong');
    b.disabled = true;
  });

  if (!isCorrect) {
    const wb = Storage.load('ling_wrongbook') || [];
    const ex = wb.find(w => w.word === q.word);
    if (ex) { ex.wrongCount++; ex.lastWrong = new Date().toISOString().split('T')[0]; }
    else wb.push({id:'vocab_'+q.word, word:q.word, type:'vocabulary', wrongCount:1, lastWrong:new Date().toISOString().split('T')[0]});
    Storage.save('ling_wrongbook', wb);
  }
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  current++;
  if (current >= questions.length) { showResult(); return; }
  renderQuestion();
}

function markUncertain() {
  const btn = document.getElementById('uncertain-btn');
  btn.style.color = '#F6C453';
  btn.textContent = '📌 已標記';
}

function speakCurrent() {
  const word = questions[current]?.word || '';
  if (!word) return;
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(word);
      u.lang = 'en-US'; u.rate = 0.9; u.volume = 1;
      speechSynthesis.speak(u);
    }, 100);
  }
}

function showResult() {
  const elapsed = Math.round((Date.now() - startTime) / 1000);
  const mins = String(Math.floor(elapsed/60)).padStart(2,'0');
  const secs = String(elapsed%60).padStart(2,'0');
  const pct = Math.round(correct / words.length * 100);

  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('result-sub').textContent = `${correct} / ${words.length} 正確`;
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-time').textContent = `${mins}:${secs}`;

  const msgs = {90:'🎉 超強！你是單字王！', 70:'👍 太棒了！繼續保持！', 60:'📚 不錯！再加把勁！', 0:'💪 繼續練習，你可以的！'};
  const msgKey = Object.keys(msgs).reverse().find(k => pct >= parseInt(k));
  document.getElementById('result-msg').textContent = msgs[msgKey];

  if (pct >= 60) {
    const vp = Storage.load('ling_vocabulary_progress') || {};
    if (!vp.levelProgress) vp.levelProgress = {};
    vp.levelProgress[level] = { done: true, pct: 100, accuracy: pct };
    if (!vp.accuracy) vp.accuracy = pct;
    Storage.save('ling_vocabulary_progress', vp);
    document.getElementById('unlock-announce').textContent = `🔓 恭喜解鎖 Level ${level+1}！繼續挑戰下一關！`;
  } else {
    document.getElementById('unlock-announce').textContent = `需要正確率 60% 以上才能解鎖下一關，再試一次吧！`;
    document.getElementById('btn-next-level').style.opacity = '0.4';
    document.getElementById('btn-next-level').disabled = true;
  }

  document.getElementById('result-overlay').classList.add('show');

  const today = new Date().toISOString().split('T')[0];
  const journal = Storage.load('ling_journal') || [];
  const todayEntry = journal.find(j => j.date === today);
  if (todayEntry) { todayEntry.vocabulary = (todayEntry.vocabulary||0) + words.length; todayEntry.accuracy = pct; }
  else journal.push({ date: today, vocabulary: words.length, phrases: 0, reading: 0, accuracy: pct, studyTime: Math.round(elapsed/60) });
  Storage.save('ling_journal', journal);
}

function retryQuiz() {
  current = 0; correct = 0; wrong = 0; startTime = Date.now();
  document.getElementById('result-overlay').classList.remove('show');
  generateQuestions(); renderQuestion();
}

function goNextLevel() {
  window.location.href = `vocabulary.html?level=${level+1}`;
}

document.addEventListener('DOMContentLoaded', () => {
  generateQuestions();
  renderQuestion();
});
</script>
